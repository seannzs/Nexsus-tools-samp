<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMP AI Character Story Generator (Tanpa API Key)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            color: #00fff0;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #8c92ac;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #00fff0;
        }
        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #0f3460;
            border-radius: 5px;
            background-color: #1a1a2e;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }
        .btn-generate { background-color: #00fff0; color: #1a1a2e; font-size: 16px; }
        .btn-copy { background-color: #4ecc71; color: #fff; margin-top: 15px; display: none; }
        button:disabled { background-color: #555; cursor: not-allowed; color: #aaa; }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        
        .output-container {
            margin-top: 30px;
            display: none;
        }
        #output {
            background: #1a1a2e;
            border-left: 5px solid #00fff0;
            padding: 20px;
            white-space: pre-wrap;
            border-radius: 5px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            line-height: 1.6;
            color: #fff;
            text-align: justify;
        }
        .loading {
            display: none;
            text-align: center;
            color: #ffbc00;
            font-weight: bold;
            margin-top: 15px;
        }
        .pastebin-link {
            display: none;
            margin-top: 15px;
            text-align: center;
            background: #222;
            padding: 10px;
            border-radius: 5px;
        }
        .pastebin-link a {
            color: #00fff0;
            font-weight: bold;
            text-decoration: none;
        }
        .pastebin-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>GTA:SAMP AI Character Story Generator</h2>
    <p class="subtitle">Membuat cerita otomatis murni AI tanpa perlu menggunakan API Key apapun</p>

    <div class="form-group">
        <label for="charName">Nama Karakter (Gunakan Underscore '_')</label>
        <input type="text" id="charName" placeholder="Contoh: Carl_Johnson" required>
    </div>
    
    <div class="form-group">
        <label for="birthPlace">Tempat Lahir</label>
        <input type="text" id="birthPlace" placeholder="Contoh: Brooklyn, USA" required>
    </div>
    
    <div class="form-group">
        <label for="birthDate">Tanggal Lahir</label>
        <input type="date" id="birthDate" required>
    </div>

    <div class="form-group">
        <label for="promptTambahan">Detail Cerita Tambahan (Opsional)</label>
        <input type="text" id="promptTambahan" placeholder="Contoh: Suka balapan, merantau karena miskin, mantan napi">
    </div>
    
    <button class="btn-generate" id="btnGen" onclick="generateStoryNoKey()">Buat Cerita via AI Bebas Akses ✨</button>
    
    <div class="loading" id="loadingText">AI sedang memikirkan & menulis ceritamu... Mohon tunggu sebentar...</div>

    <div class="output-container" id="outputContainer">
        <label style="font-size: 18px; margin-bottom: 10px;">Hasil Kebutuhan Forum:</label>
        <div id="output"></div>
        
        <button class="btn-copy" id="btnCopy" onclick="copyText()">Salin Teks Cerita</button>
        
        <div class="pastebin-link" id="pastebinLink">
            Teks Berhasil Disalin! <a href="https://pastebin.com" target="_blank">Klik disini untuk buka Pastebin</a> lalu tekan CTRL+V.
        </div>
    </div>
</div>

<script>
    async function generateStoryNoKey() {
        const fullName = document.getElementById('charName').value.trim();
        const place = document.getElementById('birthPlace').value.trim();
        const dateInput = document.getElementById('birthDate').value;
        const infoTambahan = document.getElementById('promptTambahan').value.trim();

        if(!fullName || !place || !dateInput) {
            alert("Mohon isi semua data formulir terlebih dahulu!");
            return;
        }

        const dateObj = new Date(dateInput);
        const day = String(dateObj.getDate()).padStart(2, '0');
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const year = dateObj.getFullYear();
        const formatCSDate = `${day}/${month}/${year}`;

        document.getElementById('loadingText').style.display = 'block';
        document.getElementById('outputContainer').style.display = 'none';
        document.getElementById('btnGen').disabled = true;

        // Menyusun Instruksi/Prompt ketat untuk AI
        const promptAI = `Buatkan cerita latar belakang karakter (Character Story) untuk game GTA SAMP. Gunakan Bahasa Indonesia yang baku, rapi, dan mengalir formal (gaya tulisan novel/cerita). Cerita WAJIB minimal terdiri dari 3 paragraf panjang (total minimal 300 kata). Tulis HANYA bagian ceritanya saja tanpa teks pembuka/penutup. Berikan 5 spasi di awal setiap paragraf agar menjorok ke dalam (indentasi). Data Karakter - Nama: ${fullName.replace('_', ' ')}, Tempat Lahir: ${place}, Tanggal Lahir: ${day}/${month}/${year}. Detail tambahan alur: ${infoTambahan ? infoTambahan : 'Ceritakan masa kecilnya, alasan dia merantau ke Los Santos, dan pekerjaannya saat ini untuk bertahan hidup di Los Santos.'}`;

        try {
            // Menggunakan endpoint publik berbasis Llama-3/Qwen tanpa autentikasi API Key
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{ role: "user", content: promptAI }],
                    model: "openai" // Menggunakan model teks optimal dari pollinations gratisan
                })
            });

            if (!response.ok) throw new Error("Gagal mengambil data dari AI gratis server.");
            
            const aiStory = await response.text();

            // Gabungkan teks akhir template Forum
            const finalOutput = `Character: ${fullName}\nOrigin: ${place}\nStory Character Born: ${formatCSDate}\n\n--- Character Story ---\n\n${aiStory}`;

            document.getElementById('output').innerText = finalOutput;
            document.getElementById('outputContainer').style.display = 'block';
            document.getElementById('btnCopy').style.display = 'block';
            document.getElementById('outputContainer').scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            alert("Koneksi AI Terganggu: " + error.message + "\nSilakan coba klik tombol sekali lagi.");
        } finally {
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('btnGen').disabled = false;
        }
    }

    function copyText() {
        const textToCopy = document.getElementById('output').innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            document.getElementById('pastebinLink').style.display = 'block';
            alert("Character Story berhasil disalin!");
        }).catch(err => {
            alert("Gagal menyalin: " + err);
        });
    }
</script>

</body>
</html>
