<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Eternal Orbit — A Cinematic Love Memory</title>
<meta name="description" content="A cinematic 3D romantic galaxy experience built with Three.js" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />

<!-- Three.js core + addons resolved via import map (no build step required) -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<!-- GSAP drives every timed cinematic beat -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

  <!-- ============ 3D STAGE ============ -->
  <canvas id="bg"></canvas>

  <!-- subtle vignette + grain layered over the WebGL canvas -->
  <div id="vignette"></div>

  <!-- ============ ENTRY OVERLAY ============ -->
  <div id="tap-overlay">
    <div class="orbit-ring r1"></div>
    <div class="orbit-ring r2"></div>
    <div class="orbit-ring r3"></div>
    <div class="entry-content">
      <p class="eyebrow">A Memory Written In Starlight</p>
      <h1 class="entry-title">Eternal Orbit</h1>
      <p class="tap-cta">
        <span class="pulse-dot"></span>
        Tap Anywhere To Start The Experience
      </p>
      <p class="entry-hint">Best with sound on · headphones recommended</p>
    </div>
  </div>

  <!-- ============ MINIMAL RUNTIME UI ============ -->
  <button id="sound-toggle" aria-label="Toggle music">
    <svg id="icon-sound-on" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M4 9v6h4l5 5V4L8 9H4zm11.5 3c0-1.77-1-3.29-2.5-4.03v8.06c1.5-.74 2.5-2.26 2.5-4.03z"/></svg>
    <svg id="icon-sound-off" viewBox="0 0 24 24" width="20" height="20" style="display:none"><path fill="currentColor" d="M16.5 12c0-1.77-1-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.94 8.94 0 0021 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 003.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
  </button>

  <div id="explore-ui">
    <p class="explore-title">You're now drifting freely among the memories.</p>
    <p class="explore-sub">Drag to look around · Pinch or scroll to zoom</p>
    <button id="replay-btn">Replay The Cinematic ♥</button>
  </div>

  <!-- hidden YouTube player, audio only -->
  <div id="yt-player" style="position:absolute;width:0;height:0;overflow:hidden;"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
