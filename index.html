<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA:SAMP AI Character Story Generator (Gemini)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            color: #00fff0;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #8c92ac;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #00fff0;
        }
        input[type="text"], input[type="password"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #0f3460;
            border-radius: 5px;
            background-color: #1a1a2e;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }
        .btn-generate { background-color: #00fff0; color: #1a1a2e; font-size: 16px; }
        .btn-copy { background-color: #4ecc71; color: #fff; margin-top: 15px; display: none; }
        button:disabled { background-color: #555; cursor: not-allowed; color: #aaa; }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        
        .output-container {
            margin-top: 30px;
            display: none;
        }
        #output {
            background: #1a1a2e;
            border-left: 5px solid #00fff0;
            padding: 20px;
            white-space: pre-wrap;
            border-radius: 5px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            line-height: 1.6;
            color: #fff;
            text-align: justify;
        }
        .loading {
            display: none;
            text-align: center;
            color: #ffbc00;
            font-weight: bold;
            margin-top: 15px;
        }
        .pastebin-link {
            display: none;
            margin-top: 15px;
            text-align: center;
            background: #222;
            padding: 10px;
            border-radius: 5px;
        }
        .pastebin-link a {
            color: #00fff0;
            font-weight: bold;
            text-decoration: none;
        }
        .pastebin-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>GTA:SAMP Character Story Generator</h2>
    <p class="subtitle">Membuat cerita otomatis & unik langsung menggunakan AI Gemini</p>
    
    <div class="form-group">
        <label for="apiKey">Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Masukkan AIzaSy... milikmu" required>
        <small style="color: #8c92ac; font-size: 12px;">Dapatkan API key gratis di Google AI Studio.</small>
    </div>

    <div class="form-group">
        <label for="charName">Nama Karakter (Gunakan Underscore '_')</label>
        <input type="text" id="charName" placeholder="Contoh: Carl_Johnson" required>
    </div>
    
    <div class="form-group">
        <label for="birthPlace">Tempat Lahir</label>
        <input type="text" id="birthPlace" placeholder="Contoh: Brooklyn, USA" required>
    </div>
    
    <div class="form-group">
        <label for="birthDate">Tanggal Lahir</label>
        <input type="date" id="birthDate" required>
    </div>

    <div class="form-group">
        <label for="promptTambahan">Detail Tambahan Karakter (Opsional)</label>
        <input type="text" id="promptTambahan" placeholder="Contoh: Suka balapan, merantau karena miskin, mantan napi">
    </div>
    
    <button class="btn-generate" id="btnGen" onclick="generateStoryWithGemini()">Buat Cerita via Gemini AI ✨</button>
    
    <div class="loading" id="loadingText">Sedang memikirkan cerita... Harap tunggu sekitar 5-10 detik...</div>

    <div class="output-container" id="outputContainer">
        <label style="font-size: 18px; margin-bottom: 10px;">Hasil Kebutuhan Forum SAMP:</label>
        <div id="output"></div>
        
        <button class="btn-copy" id="btnCopy" onclick="copyText()">Salin Teks Cerita</button>
        
        <div class="pastebin-link" id="pastebinLink">
            Teks Berhasil Disalin! <a href="https://pastebin.com" target="_blank">Klik disini untuk buka Pastebin</a> lalu tekan CTRL+V.
        </div>
    </div>
</div>

<script>
    async function generateStoryWithGemini() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const fullName = document.getElementById('charName').value.trim();
        const place = document.getElementById('birthPlace').value.trim();
        const dateInput = document.getElementById('birthDate').value;
        const infoTambahan = document.getElementById('promptTambahan').value.trim();

        if(!apiKey || !fullName || !place || !dateInput) {
            alert("Mohon isi semua data termasuk API Key Gemini!");
            return;
        }

        // Format Tanggal Lahir untuk Header Forum (DD/MM/YYYY)
        const dateObj = new Date(dateInput);
        const day = String(dateObj.getDate()).padStart(2, '0');
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const year = dateObj.getFullYear();
        const formatCSDate = `${day}/${month}/${year}`;

        // Aktifkan Efek Loading
        document.getElementById('loadingText').style.display = 'block';
        document.getElementById('outputContainer').style.display = 'none';
        document.getElementById('btnGen').disabled = true;

        // Prompt perintah khusus untuk AI agar lolos sensor forum SAMP (seperti JGRP)
        const promptAI = `Buatkan cerita latar belakang karakter (Character Story) untuk game GTA SAMP.
        Gunakan Bahasa Indonesia yang baku, rapi, dan mengalir formal (gaya tulisan cerita novel).
        Cerita WAJIB minimal terdiri dari 3 paragraf panjang (total minimal 300 kata atau lebih).
        Tulis hanya bagian ceritanya saja, jangan beri teks pengantar seperti "Berikut adalah ceritanya".
        Setiap awal paragraf berikan 5 spasi karakter agar menjorok ke dalam (indentasi).

        Data Karakter:
        - Nama Karakter: ${fullName.replace('_', ' ')} (Panggil nama depan atau nama lengkapnya secara dinamis dan natural di dalam cerita).
        - Tempat Lahir: ${place}
        - Tanggal Lahir: ${day} dari bulan ke ${month} tahun ${year}
        - Detail Alur Cerita Tambahan: ${infoTambahan ? infoTambahan : "Ceritakan kisah masa kecilnya, alasan merantau ke Los Santos, dan pekerjaannya sekarang di Los Santos untuk bertahan hidup."}`;

        try {
            // Memanggil API Gemini langsung dari Client-Side
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: promptAI }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            const aiStory = data.candidates[0].content.parts[0].text;

            // Format Final Gabungan Header + Hasil AI
            const finalOutput = `Character: ${fullName}\nOrigin: ${place}\nStory Character Born: ${formatCSDate}\n\n--- Character Story ---\n\n${aiStory}`;

            // Tampilkan ke layar
            document.getElementById('output').innerText = finalOutput;
            document.getElementById('outputContainer').style.display = 'block';
            document.getElementById('btnCopy').style.display = 'block';
            
            // Scroll ke bawah
            document.getElementById('outputContainer').scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            alert("Terjadi Kesalahan API:\n" + error.message);
            console.error(error);
        } finally {
            // Matikan Efek Loading
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('btnGen').disabled = false;
        }
    }

    function copyText() {
        const textToCopy = document.getElementById('output').innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            document.getElementById('pastebinLink').style.display = 'block';
            alert("Character Story berhasil disalin ke clipboard!");
        }).catch(err => {
            alert("Gagal menyalin: " + err);
        });
    }
</script>

</body>
</html>
